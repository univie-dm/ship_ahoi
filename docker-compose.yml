services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NITRO_API_BASE=http://backend:8000
      - API_BASE=http://backend:8000
      - HISTORY_PERSISTENCE_ENABLED=true
      - REDIS_CONNECTION_TIMEOUT=5000
      - MAX_CACHED_RUNS=50
    networks:
      - ship-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./server:/app/server
      - upload_data:/app/uploads
    networks:
      - ship-network
    restart: unless-stopped
    command: /opt/venv/bin/python -m uvicorn server.clustering_api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "/opt/venv/bin/python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ship-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

networks:
  ship-network:
    driver: bridge

volumes:
  upload_data:
  redis_data: